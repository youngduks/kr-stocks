name: Aggregate News (국제정세 + 삼성·하이닉스·현대차)

# 매 시간 한국 경제뉴스 RSS aggregator + 키워드 필터 → data/news/*.json
# 5/26: 신선도 ↑ (2h → 1h). Vercel invocation 영향 minimal (build minutes만 추가 사용)
on:
  schedule:
    - cron: "0 * * * *"   # every 1h (UTC) — 신선도 ↑ (5/26)
  workflow_dispatch:           # 수동 실행 허용

permissions:
  contents: write

concurrency:
  group: aggregate-news
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run news aggregator
        run: node scripts/aggregate-news.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet data/news/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes — skipping commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat data/news/
          fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "youngduks"
          git config user.email "130581659+youngduks@users.noreply.github.com"
          git add data/news/
          DATE_KST=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')
          git commit -m "chore(news): auto-aggregate ${DATE_KST} KST

          Sources: 한경 / 머투 / 연합뉴스 (경제+국제)
          Categories: intl / samsung / hynix / hyundai
          "
          git push
