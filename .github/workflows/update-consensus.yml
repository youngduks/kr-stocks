name: Update Consensus (네이버 컨센서스 자동 갱신)

on:
  schedule:
    - cron: "0 7 * * 1-5" # 평일 07:00 UTC = 16:00 KST (장 마감 30분 후)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run update-consensus script
        run: node scripts/update-consensus.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then echo "changed=false" >> "$GITHUB_OUTPUT"
          else echo "changed=true" >> "$GITHUB_OUTPUT"; fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "youngduks"
          git config user.email "130581659+youngduks@users.noreply.github.com"
          git add -A
          git commit -m "chore(consensus): auto-update $(TZ=Asia/Seoul date +'%Y-%m-%d') KST"
          git push
