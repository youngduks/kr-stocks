name: Update Poll (인간지표 자동 로테이션)

on:
  schedule:
    - cron: "15 7 * * 1-5" # 평일 07:15 UTC = 16:15 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run update-poll script
        run: node scripts/update-poll.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then echo "changed=false" >> "$GITHUB_OUTPUT"
          else echo "changed=true" >> "$GITHUB_OUTPUT"; fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "youngduks"
          git config user.email "130581659+youngduks@users.noreply.github.com"
          git add -A
          git commit -m "chore(poll): auto-rotate $(TZ=Asia/Seoul date +'%Y-%m-%d') KST"
          git push
